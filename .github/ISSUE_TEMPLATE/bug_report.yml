name: 🐛 Bug Report
description: 报告一个 Bug / Report a bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请尽量填全以下信息，方便定位问题。
        Thanks for the report! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: 问题描述 / What happened?
      description: 清晰描述遇到的问题
      placeholder: 执行 xxx 时出现 yyy
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to reproduce
      description: 最小复现步骤
      placeholder: |
        1. 运行 `scripts/create-platform-project.sh ...`
        2. 观察到 ...
    validations:
      required: true
  - type: textarea
    id: inspect-output
    attributes:
      label: inspect 输出 / inspect-project.sh output
      description: 粘贴 `scripts/inspect-project.sh <path>` 的输出
      render: shell
  - type: input
    id: agent
    attributes:
      label: AI Agent
      description: Claude Code / Codex / Cursor / OpenClaw / 其他
      placeholder: Claude Code
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 环境 / Environment
      description: 操作系统 + Bash 版本（`bash --version`）
      placeholder: macOS 15 / Bash 5.2
    validations:
      required: true
