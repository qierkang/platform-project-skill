name: ✨ Feature Request
description: 提出新功能或改进建议 / Suggest a feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！为避免无效劳动，建议先讨论方向再提 PR。
        Thanks! Please discuss the direction here before a large PR.
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题 / Problem
      description: 这个功能解决什么痛点？
      placeholder: 我在 xxx 场景下，希望能够 yyy
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 设想的方案 / Proposed solution
      description: 你希望它如何工作
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围 / Scope
      options:
        - 新项目工作流 (new)
        - 老项目升级 (existing)
        - 脚本 (scripts)
        - 文档 / README
        - omni-platform 母版
        - 其他 / Other
    validations:
      required: true
